<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sports Calendar</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
            background: #f4f4f4;
        }

        h1 {
            text-align: center;
        }

        .navbar {
            background: #333;
            padding: 10px;
        }

        .navbar a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        .event {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
        }

        .form {
            background: white;
            padding: 15px;
            margin-top: 20px;
            border-radius: 8px;
        }

        input,
        select {
            margin: 5px 0;
            padding: 8px;
            width: 100%;
        }

        button {
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <a href="#">Home</a>
        <a href="#">Events</a>
        <a href="#">Sports</a>
    </div>
    <div class="container">
        <h1>Sports Events</h1>
        <div id="events"></div>
        <div class="form">
            <h2>Add Event</h2>
            <input type="date" id="date">
            <input type="time" id="time">
            <input type="text" id="status" placeholder="Status">
            <input type="number" id="season" placeholder="Season">
            <input type="text" id="homeTeam" placeholder="Home Team ID">
            <input type="text" id="awayTeam" placeholder="Away Team ID">
            <button onclick="addEvent()">Add Event</button>
        </div>
    </div>

    <script>
        async function loadEvents() {
            const res = await fetch('/api/events');
            const data = await res.json();

            const container = document.getElementById('events');
            container.innerHTML = '';

            data.forEach(e => {
                const div = document.createElement('div');
                div.className = 'event';
                div.innerHTML = `
            <strong>${e.date} ${e.time}</strong><br>
            ${e.homeTeam?.name || 'TBD'} vs ${e.awayTeam?.name || 'TBD'}<br>
            Status: ${e.status}
        `;
                container.appendChild(div);
            });
        }

        async function addEvent() {
            const event = {
                date: document.getElementById('date').value,
                time: document.getElementById('time').value,
                status: document.getElementById('status').value,
                season: parseInt(document.getElementById('season').value),
                homeTeam: { id: parseInt(document.getElementById('homeTeam').value) },
                awayTeam: { id: parseInt(document.getElementById('awayTeam').value) }
            };

            await fetch('/api/events', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(event)
            });
            loadEvents();
        }
        loadEvents();
    </script>
</body>
</html>
